<!-- Chatbot UI Widget -->
<link rel="stylesheet" href="{{ url_for('static', filename='chatbot.css') }}">
<div id="c-chatbot-widget" class="chatbot-hidden">
    <div class="chatbot-header">
        <h4>Book Assistant</h4>
        <button id="c-chatbot-toggle" class="btn btn-sm btn-default">&times;</button>
    </div>
    <div class="chatbot-body" id="c-chatbot-messages">
        <!-- Messages will appear here -->
        <div class="bot-message">Hi! Which book do you want to ask about?</div>
    </div>
    <div class="chatbot-footer">
        <input type="text" id="c-chatbot-input" class="form-control" placeholder="Type a message or book name...">
        <button id="c-chatbot-send" class="btn btn-primary">Send</button>
        <button id="c-chatbot-reset" class="btn btn-warning btn-sm" style="margin-top: 5px; width: 100%;">Change Book
            Context</button>
    </div>
</div>
<button id="c-chatbot-open" class="btn btn-success btn-lg">💬</button>
<script src="{{ url_for('static', filename='chatbot.js') }}"></script>
